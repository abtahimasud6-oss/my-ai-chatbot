<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masud AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f0f10;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  #chat-container {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }
  #chat-header {
    background: #1a1a1c;
    color: #fff;
    padding: 18px 30px;
    font-size: 18px;
    font-weight: 600;
    border-bottom: 1px solid #2a2a2d;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  #chat-box {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    max-width: 850px;
    width: 100%;
    margin: 0 auto;
  }
  .message-row {
    display: flex;
    gap: 12px;
    margin: 16px 0;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .row-user { flex-direction: row-reverse; }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }
  .avatar-bot {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
  }
  .avatar-user {
    background: #2a2a2d;
    color: #aaa;
  }
  .message {
    padding: 12px 18px;
    border-radius: 16px;
    max-width: 70%;
    word-wrap: break-word;
    line-height: 1.6;
    font-size: 15px;
  }
  .bot-msg {
    background: #1e1e21;
    color: #e8e8e8;
    border-bottom-left-radius: 4px;
  }
  .user-msg {
    background: #6366f1;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 18px;
  }
  .typing-indicator span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #888;
    animation: blink 1.4s infinite both;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }
  #input-area {
    display: flex;
    padding: 20px 30px 28px;
    max-width: 850px;
    width: 100%;
    margin: 0 auto;
    gap: 10px;
  }
  #user-input {
    flex: 1;
    padding: 15px 20px;
    border: 1px solid #2a2a2d;
    border-radius: 26px;
    outline: none;
    font-size: 15px;
    background: #1a1a1c;
    color: #fff;
  }
  #user-input::placeholder { color: #777; }
  #user-input:focus { border-color: #6366f1; }
  #send-btn {
    padding: 0 26px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 26px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.15s ease;
  }
  #send-btn:hover { background: #5457e0; }
  #chat-box::-webkit-scrollbar { width: 6px; }
  #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">
    <div class="header-avatar">🤖</div>
    Masud AI
  </div>
  <div id="chat-box"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="মেসেজ লিখো...">
    <button id="send-btn">পাঠাও</button>
  </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

function addMessage(text, sender) {
  const row = document.createElement("div");
  row.classList.add("message-row", sender === "user" ? "row-user" : "row-bot");

  const avatar = document.createElement("div");
  avatar.classList.add("avatar", sender === "user" ? "avatar-user" : "avatar-bot");
  avatar.textContent = sender === "user" ? "🙂" : "🤖";

  const msg = document.createElement("div");
  msg.classList.add("message", sender === "user" ? "user-msg" : "bot-msg");
  msg.textContent = text;

  row.appendChild(avatar);
  row.appendChild(msg);
  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
  return row;
}

function showTyping() {
  const row = document.createElement("div");
  row.classList.add("message-row", "row-bot");
  row.id = "typing-row";

  const avatar = document.createElement("div");
  avatar.classList.add("avatar", "avatar-bot");
  avatar.textContent = "🤖";

  const typing = document.createElement("div");
  typing.classList.add("message", "bot-msg");
  typing.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  row.appendChild(avatar);
  row.appendChild(typing);
  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const row = document.getElementById("typing-row");
  if (row) row.remove();
}

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  userInput.value = "";
  showTyping();

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message })
  });

  const data = await response.json();
  removeTyping();
  addMessage(data.reply, "bot");
}

sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
