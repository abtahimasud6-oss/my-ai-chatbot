<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমার AI চ্যাটবট</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  #chat-container {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }
  #chat-header {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    padding: 20px 30px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chat-header::before {
    content: "🤖";
    font-size: 24px;
  }
  #chat-box {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }
  .message {
    margin: 8px 0;
    padding: 14px 20px;
    border-radius: 18px;
    max-width: 70%;
    word-wrap: break-word;
    line-height: 1.5;
    font-size: 15px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .user-msg {
    background: rgba(255,255,255,0.95);
    color: #333;
    margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .bot-msg {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    border-bottom-left-radius: 4px;
  }
  #input-area {
    display: flex;
    padding: 20px 30px 30px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    gap: 12px;
  }
  #user-input {
    flex: 1;
    padding: 16px 22px;
    border: none;
    border-radius: 30px;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.95);
  }
  #send-btn {
    padding: 16px 30px;
    background: #333;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    transition: transform 0.15s ease;
  }
  #send-btn:hover {
    transform: scale(1.05);
  }
  #chat-box::-webkit-scrollbar {
    width: 6px;
  }
  #chat-box::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">আমার AI চ্যাটবট</div>
  <div id="chat-box"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="মেসেজ লিখো...">
    <button id="send-btn">পাঠাও</button>
  </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender === "user" ? "user-msg" : "bot-msg");
  msg.textContent = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  userInput.value = "";

  const response = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message })
  });

  const data = await response.json();
  addMessage(data.reply, "bot");
}

sendBtn.addEventListener("click", sendMessage);
userInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
